<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <title>Dashboard</title>
</head>
<body>
    <div class="container">
        <h2>Admin Dashboard</h2>
        <table>
            <th>User</th><th>Level</th><th>Action</th>
            {%for user in users%}
            <tr>
                <td>{{user['username']}}</td>
                <td>{{user['level']}}</td>
                <td style="text-align: center">
                    {% if user['username'] != current_user.username %}
                    <form action="{{ url_for('delete_user', user_id=user['id']) }}" method="POST" style="margin: 0;">
                        <button type="submit" class="btn-delete" title="Delete user" onclick="return confirm('Are you sure you want to delete this user?');"><i class="fa fa-trash"></i></button>
                    </form>
                    {% endif %}
                </td>
            </tr>
            {%endfor%}
        </table>
        <hr style="border: 0; border-top: 1px solid #eee; margin: 20px 0;">
        <a href="{{ url_for('logout') }}">Logout</a>
    </div>
</body>
</html>
